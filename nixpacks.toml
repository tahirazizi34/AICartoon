# nixpacks.toml
# Railway uses Nixpacks to build. This installs ffmpeg system dependency.

[phases.setup]
nixPkgs = ["ffmpeg", "nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npx prisma migrate deploy && npm start"
